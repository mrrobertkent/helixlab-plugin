<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- Minimal fontconfig for static ffmpeg builds that lack system fontconfig.
     Lists common font directories across macOS, Linux, and Windows/WSL. -->
<fontconfig>
  <!-- macOS -->
  <dir>/System/Library/Fonts</dir>
  <dir>/Library/Fonts</dir>
  <dir>~/Library/Fonts</dir>
  <!-- Linux -->
  <dir>/usr/share/fonts</dir>
  <dir>/usr/local/share/fonts</dir>
  <!-- XDG default -->
  <dir prefix="xdg">fonts</dir>
</fontconfig>
