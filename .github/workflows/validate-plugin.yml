name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: |
          echo "=== Validating marketplace-level plugin.json ==="
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          echo "  PASS: .claude-plugin/plugin.json is valid JSON"

          echo ""
          echo "=== Validating marketplace.json ==="
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "  PASS: .claude-plugin/marketplace.json is valid JSON"

          echo ""
          echo "=== Validating plugin-level plugin.json files ==="
          for pdir in plugins/*/; do
            pjson="$pdir.claude-plugin/plugin.json"
            if [ -f "$pjson" ]; then
              python3 -c "import json; json.load(open('$pjson'))"
              echo "  PASS: $pjson is valid JSON"
            else
              echo "  WARN: $pjson not found"
            fi
          done

      - name: Check required fields
        run: |
          echo "=== Checking marketplace-level plugin.json required fields ==="
          python3 -c "
          import json, sys
          data = json.load(open('.claude-plugin/plugin.json'))
          errors = []
          if 'name' not in data:
              errors.append('Missing required field: name')
          if 'version' not in data:
              errors.append('Missing required field: version')
          if errors:
              for e in errors:
                  print(f'  FAIL: {e}')
              sys.exit(1)
          print(f'  PASS: name={data[\"name\"]}, version={data[\"version\"]}')
          "

          echo ""
          echo "=== Checking marketplace.json required fields ==="
          python3 -c "
          import json, sys
          data = json.load(open('.claude-plugin/marketplace.json'))
          errors = []
          if 'name' not in data:
              errors.append('Missing required field: name')
          if 'plugins' not in data or len(data['plugins']) == 0:
              errors.append('Missing or empty plugins array')
          if errors:
              for e in errors:
                  print(f'  FAIL: {e}')
              sys.exit(1)
          print(f'  PASS: marketplace={data[\"name\"]}, plugins={len(data[\"plugins\"])}')
          "

      - name: Check version sync across all plugins
        run: |
          echo "=== Checking version sync between plugin.json files and marketplace.json ==="
          python3 -c "
          import json, sys, os

          marketplace = json.load(open('.claude-plugin/marketplace.json'))
          errors = []

          for mp in marketplace.get('plugins', []):
              name = mp.get('name')
              mp_version = mp.get('version')
              source = mp.get('source', '')

              plugin_json_path = os.path.join(source, '.claude-plugin', 'plugin.json')
              if os.path.exists(plugin_json_path):
                  plugin_data = json.load(open(plugin_json_path))
                  plugin_version = plugin_data.get('version')
                  plugin_name = plugin_data.get('name')

                  if plugin_name != name:
                      errors.append(f'{name}: name mismatch — marketplace.json={name}, {plugin_json_path}={plugin_name}')
                  if plugin_version != mp_version:
                      errors.append(f'{name}: version mismatch — marketplace.json={mp_version}, {plugin_json_path}={plugin_version}')
                  else:
                      print(f'  PASS: {name} versions in sync at {mp_version}')
              else:
                  errors.append(f'{name}: plugin.json not found at {plugin_json_path}')

          if errors:
              for e in errors:
                  print(f'  FAIL: {e}')
              sys.exit(1)
          "

      - name: Validate semver format
        run: |
          echo "=== Checking semver format ==="
          python3 -c "
          import json, re, sys

          version = json.load(open('.claude-plugin/plugin.json')).get('version', '')
          if not re.match(r'^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$', version):
              print(f'  FAIL: marketplace version is not valid semver')
              sys.exit(1)
          print(f'  PASS: marketplace version {version} is valid semver')

          marketplace = json.load(open('.claude-plugin/marketplace.json'))
          for p in marketplace.get('plugins', []):
              v = p.get('version', '')
              name = p.get('name', 'unknown')
              if not re.match(r'^\d+\.\d+\.\d+(-[a-zA-Z0-9.]+)?$', v):
                  print(f'  FAIL: {name} version is not valid semver')
                  sys.exit(1)
              print(f'  PASS: {name} version {v} is valid semver')
          "

  test-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg bc

      - name: Run visual-lab script tests
        run: bash plugins/visual-lab/tests/test-scripts.sh --check-ffmpeg
